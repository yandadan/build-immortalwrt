name: Build ImmortalWrt 24.10.4 x86_64 (ImageBuilder)

on:
  workflow_dispatch:
  # 可选：每月1日自动触发更新
  # schedule:
  #   - cron: '0 2 1 * *'

env:
  IWR_VERSION: "24.10.4"
  IB_URL: "https://downloads.immortalwrt.org/releases/24.10.4/targets/x86/64/immortalwrt-imagebuilder-24.10.4-x86-64.Linux-x86_64.tar.zst"
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build ImmortalWrt x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ----------------------------------------------------------------
      # 1. 检出仓库
      # ----------------------------------------------------------------
      - name: 检出仓库
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. 初始化系统环境
      # ----------------------------------------------------------------
      - name: 初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential libncurses5-dev libncursesw5-dev zlib1g-dev \
            gawk git gettext libssl-dev xsltproc rsync wget unzip python3 \
            qemu-utils zstd file
          sudo timedatectl set-timezone "$TZ"
          echo "DATE=$(date +'%Y%m%d-%H%M')" >> "$GITHUB_ENV"

      # ----------------------------------------------------------------
      # 3. 下载并解压 ImageBuilder
      # ----------------------------------------------------------------
      - name: 下载 ImmortalWrt ImageBuilder
        run: |
          mkdir -p /opt/imagebuilder
          wget -q --show-progress "$IB_URL" -O /tmp/ib.tar.zst
          tar --zstd -xf /tmp/ib.tar.zst -C /opt/imagebuilder --strip-components=1
          echo "ImageBuilder 准备完毕"

      # ----------------------------------------------------------------
      # 4. 下载第三方 ipk：OpenClash
      # ----------------------------------------------------------------
      - name: 下载 OpenClash ipk
        run: |
          mkdir -p /opt/imagebuilder/packages/third-party

          OPENCLASH_URL=$(curl -fsSL \
            "https://api.github.com/repos/vernesong/OpenClash/releases" \
            | grep "browser_download_url" \
            | grep "luci-app-openclash.*all\.ipk" \
            | head -1 \
            | cut -d'"' -f4)

          if [ -z "$OPENCLASH_URL" ]; then
            echo "::error::无法获取 OpenClash 下载地址"
            exit 1
          fi

          echo "下载 OpenClash: $OPENCLASH_URL"
          wget -q --show-progress "$OPENCLASH_URL" \
            -O /opt/imagebuilder/packages/third-party/luci-app-openclash.ipk

          # 生成本地包索引
          cd /opt/imagebuilder/packages/third-party
          /opt/imagebuilder/staging_dir/host/bin/opkg-make-index . > Packages
          gzip -9k Packages

      # ----------------------------------------------------------------
      # 5. 准备自定义配置文件
      # ----------------------------------------------------------------
      - name: 准备自定义配置文件
        run: |
          mkdir -p /opt/imagebuilder/files/etc/uci-defaults

          cat > /opt/imagebuilder/files/etc/uci-defaults/99-custom.sh << 'UCIEOF'
#!/bin/sh
# 修改默认 LAN IP
uci set network.lan.ipaddr='192.168.8.1'
uci commit network

# 修改主机名与时区
uci set system.@system[0].hostname='ImmortalWrt'
uci set system.@system[0].timezone='CST-8'
uci set system.@system[0].zonename='Asia/Shanghai'
uci commit system

# 启用 SmartDNS，监听本地 6053 端口
uci set smartdns.@smartdns[0].enabled='1'
uci set smartdns.@smartdns[0].port='6053'
uci set smartdns.@smartdns[0].bind_interface='lo'
uci commit smartdns

# 将 dnsmasq 上游指向 SmartDNS
uci set dhcp.@dnsmasq[0].server='127.0.0.1#6053'
uci set dhcp.@dnsmasq[0].noresolv='1'
uci commit dhcp

exit 0
UCIEOF
          chmod +x /opt/imagebuilder/files/etc/uci-defaults/99-custom.sh

      # ----------------------------------------------------------------
      # 6. 构建固件
      #    包列表说明：
      #      - ipv6helper 在 24.10.x x86_64 中已不存在，
      #        用 odhcp6c + odhcpd-ipv6only 替代
      #      - -dnsmasq + dnsmasq-full：移除精简版，装完整版支持 ipset
      #      - luci-app-openclash 来自上一步下载的本地 ipk
      # ----------------------------------------------------------------
      - name: 构建固件
        run: |
          cd /opt/imagebuilder

          # 将第三方包目录加入仓库列表（插在第一行，优先级最高）
          sed -i '1s|^|src/gz third_party file:packages/third-party\n|' repositories.conf

          PACKAGES=" \
            -dnsmasq \
            dnsmasq-full \
            luci \
            luci-base \
            luci-compat \
            luci-mod-admin-full \
            luci-theme-bootstrap \
            luci-app-firewall \
            luci-app-opkg \
            luci-app-openclash \
            luci-app-adguardhome \
            luci-app-smartdns \
            smartdns \
            curl \
            wget-ssl \
            ca-certificates \
            bash \
            coreutils-nohup \
            ip-full \
            ipset \
            iptables-mod-tproxy \
            kmod-tun \
            unzip \
            htop \
            nano \
            lsblk \
            block-mount \
            openssh-sftp-server \
            odhcp6c \
            odhcpd-ipv6only \
            luci-proto-ipv6 \
            luci-proto-ppp \
            kmod-inet-diag \
          "

          make image \
            PROFILE="generic" \
            PACKAGES="$PACKAGES" \
            FILES="files/" \
            EXTRA_IMAGE_NAME="custom" \
            2>&1 | tee /tmp/build.log

          if [ -z "$(ls bin/targets/x86/64/*.img.gz 2>/dev/null)" ]; then
            echo "::error::固件构建失败"
            tail -60 /tmp/build.log
            exit 1
          fi

          echo "✅ 固件构建成功"
          ls -lh bin/targets/x86/64/
          echo "FIRMWARE_PATH=/opt/imagebuilder/bin/targets/x86/64" >> "$GITHUB_ENV"

      # ----------------------------------------------------------------
      # 7. 整理固件，只保留镜像文件
      # ----------------------------------------------------------------
      - name: 整理固件文件
        run: |
          cd "$FIRMWARE_PATH"
          find . -maxdepth 1 -type f ! \( \
            -name "*combined-efi*" \
            -o -name "*combined.img*" \
            -o -name "*sysupgrade*" \
            -o -name "sha256sums" \
          \) -delete
          echo "最终固件："
          ls -lh

      # ----------------------------------------------------------------
      # 8. 上传 Artifacts（7天有效）
      # ----------------------------------------------------------------
      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-24.10.4-x86_64-${{ env.DATE }}
          path: ${{ env.FIRMWARE_PATH }}
          retention-days: 7

      # ----------------------------------------------------------------
      # 9. 发布到 GitHub Release
      # ----------------------------------------------------------------
      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v24.10.4-${{ env.DATE }}
          name: ImmortalWrt 24.10.4 x86_64 ${{ env.DATE }}
          body: |
            ## ImmortalWrt 24.10.4 x86_64 固件

            | 项目 | 内容 |
            |------|------|
            | 版本 | 24.10.4 |
            | 构建方式 | 官方 ImageBuilder |
            | 架构 | x86_64 |
            | 内核 | Linux 6.6.x |
            | 编译时间 | ${{ env.DATE }} |
            | 默认后台 | http://192.168.2.1 |
            | 默认密码 | 无密码（空） |

            ### 预装插件
            - 🔀 **OpenClash**（科学上网）
            - 🛡 **AdGuard Home**（广告过滤）
            - 🔍 **SmartDNS**（DNS 加速，端口 6053，已配为 dnsmasq 上游）

            ### 固件选择
            | 文件 | 用途 |
            |------|------|
            | `*combined-efi*.img.gz` | EFI 主板全新安装（推荐）|
            | `*combined.img.gz` | Legacy BIOS 全新安装 |
            | `*sysupgrade*.img.gz` | 已有 ImmortalWrt 在线升级 |
          files: ${{ env.FIRMWARE_PATH }}/*

      # ----------------------------------------------------------------
      # 10. 失败时上传日志
      # ----------------------------------------------------------------
      - name: 上传构建日志（仅失败时）
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log-${{ env.DATE }}
          path: /tmp/build.log
          retention-days: 3
