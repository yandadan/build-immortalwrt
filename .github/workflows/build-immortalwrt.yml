name: Build ImmortalWrt 24.10.4 x86_64 (ImageBuilder)

on:
  workflow_dispatch:

env:
  IB_URL: "https://downloads.immortalwrt.org/releases/24.10.4/targets/x86/64/immortalwrt-imagebuilder-24.10.4-x86-64.Linux-x86_64.tar.zst"
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build ImmortalWrt x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential libncurses5-dev libncursesw5-dev zlib1g-dev \
            gawk git gettext libssl-dev xsltproc rsync wget unzip python3 \
            qemu-utils zstd file
          sudo timedatectl set-timezone "$TZ"
          echo "DATE=$(date +'%Y%m%d-%H%M')" >> "$GITHUB_ENV"

      - name: 下载 ImmortalWrt ImageBuilder
        run: |
          mkdir -p /opt/imagebuilder
          wget -q --show-progress "$IB_URL" -O /tmp/ib.tar.zst
          tar --zstd -xf /tmp/ib.tar.zst -C /opt/imagebuilder --strip-components=1

      - name: 下载 OpenClash ipk
        run: |
          mkdir -p /opt/imagebuilder/packages/third-party
          OPENCLASH_URL=$(curl -fsSL \
            "https://api.github.com/repos/vernesong/OpenClash/releases" \
            | grep "browser_download_url" \
            | grep "luci-app-openclash.*all\.ipk" \
            | head -1 \
            | cut -d'"' -f4)
          if [ -z "$OPENCLASH_URL" ]; then
            echo "::error::无法获取 OpenClash 下载地址"
            exit 1
          fi
          echo "下载: $OPENCLASH_URL"
          wget -q --show-progress "$OPENCLASH_URL" \
            -O /opt/imagebuilder/packages/third-party/luci-app-openclash.ipk
          cd /opt/imagebuilder/packages/third-party
          /opt/imagebuilder/staging_dir/host/bin/opkg-make-index . > Packages
          gzip -9k Packages

      - name: 复制自定义文件到 ImageBuilder
        run: |
          cp -r "$GITHUB_WORKSPACE/files" /opt/imagebuilder/files
          chmod +x /opt/imagebuilder/files/etc/uci-defaults/99-custom.sh

      - name: 构建固件
        run: |
          cd /opt/imagebuilder
          sed -i '1s|^|src/gz third_party file:packages/third-party\n|' repositories.conf
          PACKAGES=" \
            -dnsmasq \
            dnsmasq-full \
            luci \
            luci-base \
            luci-compat \
            luci-mod-admin-full \
            luci-theme-bootstrap \
            luci-app-firewall \
            luci-app-opkg \
            luci-app-openclash \
            luci-app-adguardhome \
            luci-app-smartdns \
            smartdns \
            curl \
            wget-ssl \
            ca-certificates \
            bash \
            coreutils-nohup \
            ip-full \
            ipset \
            iptables-mod-tproxy \
            kmod-tun \
            unzip \
            htop \
            nano \
            lsblk \
            block-mount \
            openssh-sftp-server \
            odhcp6c \
            odhcpd-ipv6only \
            luci-proto-ipv6 \
            luci-proto-ppp \
            kmod-inet-diag"
          make image \
            PROFILE="generic" \
            PACKAGES="$PACKAGES" \
            FILES="files/" \
            EXTRA_IMAGE_NAME="custom" \
            2>&1 | tee /tmp/build.log
          if [ -z "$(ls bin/targets/x86/64/*.img.gz 2>/dev/null)" ]; then
            echo "::error::固件构建失败"
            tail -60 /tmp/build.log
            exit 1
          fi
          echo "FIRMWARE_PATH=/opt/imagebuilder/bin/targets/x86/64" >> "$GITHUB_ENV"

      - name: 整理固件文件
        run: |
          cd "$FIRMWARE_PATH"
          find . -maxdepth 1 -type f ! \( \
            -name "*combined-efi*" \
            -o -name "*combined.img*" \
            -o -name "*sysupgrade*" \
            -o -name "sha256sums" \
          \) -delete
          ls -lh

      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-24.10.4-x86_64-${{ env.DATE }}
          path: ${{ env.FIRMWARE_PATH }}
          retention-days: 7

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v24.10.4-${{ env.DATE }}
          name: ImmortalWrt 24.10.4 x86_64 ${{ env.DATE }}
          body: |
            ## ImmortalWrt 24.10.4 x86_64

            | 项目 | 内容 |
            |------|------|
            | 版本 | 24.10.4 |
            | 架构 | x86_64 |
            | 默认后台 | http://192.168.2.1 |
            | 默认密码 | 空 |

            **预装插件：** OpenClash · AdGuard Home · SmartDNS

            | 固件文件 | 用途 |
            |------|------|
            | `*combined-efi*.img.gz` | EFI 主板全新安装（推荐）|
            | `*combined.img.gz` | Legacy BIOS 全新安装 |
            | `*sysupgrade*.img.gz` | 在线升级 |
          files: ${{ env.FIRMWARE_PATH }}/*

      - name: 上传构建日志（仅失败时）
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log-${{ env.DATE }}
          path: /tmp/build.log
          retention-days: 3
